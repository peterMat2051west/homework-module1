<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 3 - Form</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="container">

        <header>My Website for Westcliff</header>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>

        <main>
            <h1>Contact</h1>
            <p>Fill out the signup form below.</p>

            <form action="/signup" method="post">
                <fieldset>
                    <legend>Signup Form</legend>

                    <label for="name">Name:</label>
                    <input type="text" id="name" name="name">

                    <label for="email">Email:</label>
                    <input type="text" id="email" name="email">

                    <label for="phone">Phone:</label>
                    <input type="text" id="phone" name="phone">

                    <label>Gender:</label>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>

                    <label for="contact">Preferred Contact:</label>
                    <select id="contact" name="contact">
                        <option value="email">Email</option>
                        <option value="phone">Phone</option>
                        <option value="text">Text</option>
                    </select>

                    <label for="comments">Comments:</label>
                    <textarea id="comments" name="comments" rows="5" cols="40"></textarea>

                    <input type="submit" value="Signup">
                </fieldset>
            </form>
        </main>

        <footer>&copy; Copyright 2026 My Website Name</footer>

    </div>
</body>

</html>
