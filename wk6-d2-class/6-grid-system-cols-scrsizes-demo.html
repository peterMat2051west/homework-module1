<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Screen Size Column Grid Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .grid_system div[class^="col"] {
            border: 1px solid white;
            background: #e4dcdc;
            text-align: center;
            padding-top: 5px;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container grid_system mt-3">
        <!-- Row 1: col-sm-4 x3 -->
        <div class="row">
            <div class="col-sm-4">.col-sm-4</div>
            <div class="col-sm-4">.col-sm-4</div>
            <div class="col-sm-4">.col-sm-4</div>
        </div>
        <!-- Row 2: col-md-5, col-md-7 -->
        <div class="row">
            <div class="col-md-5">.col-md-5</div>
            <div class="col-md-7">.col-md-7</div>
        </div>
        <!-- Row 3: col-lg-3, col-lg-6, col-lg-3 -->
        <div class="row">
            <div class="col-lg-3">.col-lg-3</div>
            <div class="col-lg-6">.col-lg-6</div>
            <div class="col-lg-3">.col-lg-3</div>
        </div>
        <!-- Row 4: col-xl-6 x2 -->
        <div class="row">
            <div class="col-xl-6">.col-xl-6</div>
            <div class="col-xl-6">.col-xl-6</div>
        </div>
    </div>
</body>
</html>
