<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3 Column Grid System Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .grid_system div[class^="col"] {
            border: 1px solid white;
            background: #e4dcdc;
            text-align: center;
            padding-top: 5px;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container grid_system mt-3">
        <!-- Row 1: 3 columns of col-sm-4 -->
        <div class="row">
            <div class="col-sm-4">.col-sm-4</div>
            <div class="col-sm-4">.col-sm-4</div>
            <div class="col-sm-4">.col-sm-4</div>
        </div>
        <!-- Row 2: col-sm-2, col-sm-8, col-sm-2 -->
        <div class="row">
            <div class="col-sm-2">.col-sm-2</div>
            <div class="col-sm-8">.col-sm-8</div>
            <div class="col-sm-2">.col-sm-2</div>
        </div>
    </div>
</body>
</html>
