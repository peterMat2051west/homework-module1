<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid System Demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .grid_system div[class^="col"] {
            border: 1px solid white;
            background: #e4dcdc;
            text-align: center;
            padding-top: 5px;
            padding-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container grid_system mt-3">
        <!-- Row 1: 12 columns of col-sm-1 -->
        <div class="row">
            <div class="col-sm-1">.col-sm-1</div>
            <div class="col-sm-1">.col-sm-1</div>
            <div class="col-sm-1">.col-sm-1</div>
            <div class="col-sm-1">.col-sm-1</div>
            <div class="col-sm-1">.col-sm-1</div>
            <div class="col-sm-1">.col-sm-1</div>
            <div class="col-sm-1">.col-sm-1</div>
            <div class="col-sm-1">.col-sm-1</div>
            <div class="col-sm-1">.col-sm-1</div>
            <div class="col-sm-1">.col-sm-1</div>
            <div class="col-sm-1">.col-sm-1</div>
            <div class="col-sm-1">.col-sm-1</div>
        </div>
        <!-- Row 2: 4 columns of col-sm-3 -->
        <div class="row">
            <div class="col-sm-3">.col-sm-3</div>
            <div class="col-sm-3">.col-sm-3</div>
            <div class="col-sm-3">.col-sm-3</div>
            <div class="col-sm-3">.col-sm-3</div>
        </div>
        <!-- Row 3: 3 columns of col-sm-4 -->
        <div class="row">
            <div class="col-sm-4">.col-sm-4</div>
            <div class="col-sm-4">.col-sm-4</div>
            <div class="col-sm-4">.col-sm-4</div>
        </div>
        <!-- Row 4: col-sm-3, col-sm-3, col-sm-6 -->
        <div class="row">
            <div class="col-sm-3">.col-sm-3</div>
            <div class="col-sm-3">.col-sm-3</div>
            <div class="col-sm-6">.col-sm-6</div>
        </div>
        <!-- Row 5: col-sm-5, col-sm-7 -->
        <div class="row">
            <div class="col-sm-5">.col-sm-5</div>
            <div class="col-sm-7">.col-sm-7</div>
        </div>
        <!-- Row 6: 2 columns of col-sm-6 -->
        <div class="row">
            <div class="col-sm-6">.col-sm-6</div>
            <div class="col-sm-6">.col-sm-6</div>
        </div>
        <!-- Row 7: col-sm-12 -->
        <div class="row">
            <div class="col-sm-12">.col-sm-12</div>
        </div>
    </div>
</body>
</html>
