<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Challenge 2 - Responsive Layout</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: Arial, sans-serif;
        }

        .container {
            display: grid;
            grid-template-columns: 1fr;
            grid-template-areas:
                "header"
                "side"
                "head1"
                "main1"
                "head2"
                "main2"
                "footer";
        }

        .header {
            grid-area: header;
            background-color: #ffd700;
            text-align: center;
            padding: 20px;
        }

        .head1 {
            grid-area: head1;
            background-color: lightblue;
            padding: 5px 10px;
        }

        .main1 {
            grid-area: main1;
            background-color: lightskyblue;
            min-height: 150px;
            padding: 10px;
        }

        .head2 {
            grid-area: head2;
            background-color: lightblue;
            padding: 5px 10px;
        }

        .main2 {
            grid-area: main2;
            background-color: lightskyblue;
            min-height: 150px;
            padding: 10px;
        }

        .side {
            grid-area: side;
            background-color: lightsalmon;
            min-height: 100px;
            padding: 5px 10px;
        }

        .footer {
            grid-area: footer;
            background-color: lightgreen;
            text-align: center;
            padding: 30px;
        }

        @media (min-width: 768px) {
            .container {
                grid-template-columns: 1fr 2fr;
                grid-template-areas:
                    "header header"
                    "head1  side"
                    "main1  side"
                    "head2  side"
                    "main2  side"
                    "footer footer";
            }
        }

        @media (min-width: 992px) {
            .container {
                grid-template-columns: 1fr 1fr 1fr;
                grid-template-areas:
                    "header header header"
                    "head1  head2  side"
                    "main1  main2  side"
                    "footer footer footer";
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">Header</div>
        <div class="head1">Head 1</div>
        <div class="main1">Main 1</div>
        <div class="head2">Head 2</div>
        <div class="main2">Main 2</div>
        <div class="side">Side</div>
        <div class="footer">Footer</div>
    </div>
</body>
</html>
