<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page 3 - Form</title>
</head>

<body>
    <div id="container">

        <header>My Web Site Brand</header>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="page2.html">Page 2</a></li>
                <li><a href="page3.html">Page 3</a></li>
            </ul>
        </nav>

        <main>
            <h1>Page 3</h1>
            <p>Fill out the signup form below.</p>

            <form action="/signup" method="post">
                <fieldset>
                    <legend>Signup Form</legend>

                    <label for="name">Name:</label><br>
                    <input type="text" id="name" name="name"><br>

                    <label for="email">Email:</label><br>
                    <input type="text" id="email" name="email"><br>

                    <label for="phone">Phone:</label><br>
                    <input type="text" id="phone" name="phone"><br>

                    <br>
                    <label>Gender:</label><br>
                    <input type="radio" id="male" name="gender" value="male">
                    <label for="male">Male</label>
                    <input type="radio" id="female" name="gender" value="female">
                    <label for="female">Female</label>

                    <br><br>
                    <label for="contact">Preferred Contact:</label><br>
                    <select id="contact" name="contact">
                        <option value="email">Email</option>
                        <option value="phone">Phone</option>
                        <option value="text">Text</option>
                    </select>

                    <br><br>
                    <label for="comments">Comments:</label><br>
                    <textarea id="comments" name="comments" rows="5" cols="40"></textarea>

                    <br><br>
                    <button type="submit">Signup</button>
                </fieldset>
            </form>
        </main>

        <footer>&copy; Copyright 2026 My Website Name</footer>

    </div>
</body>

</html>
