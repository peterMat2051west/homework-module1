<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My First Web Page</title>

    <style>
        header {
            background: url(central-park.png) 0 -200px no-repeat;
            height: 200px;
            font-size: 36px;
            color: #fff;
            padding: 20px 0 0 20px;
            font-weight: bold;
            font-family: arial;
        }

        nav {
            background-color: rgb(50, 50, 50);
            text-align: center;
            padding-top: 10px;
        }

        nav li {
            list-style-type: none;
            display: inline;
        }

        nav a:link,
        nav a:visited {
            padding: 10px;
            text-decoration: none;
            color: #fff;
        }

        nav a:hover {
            color: #f9b;
        }

        nav a:active {
            color: #f00;
        }

        main {
            height: 300px;
        }

        main h1 {
            color: #336699;
            font-family: georgia;
        }

        footer {
            height: 100px;
            background-color: #333;
            text-align: center;
            padding-top: 20px;
            color: #aaa;
        }
    </style>
</head>

<body>
    <div id="container">

        <header>My Web Site Brand</header>

        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="page2.html">Page 2</a></li>
                <li><a href="page3.html">Page 3</a></li>
            </ul>
        </nav>

        <main>
            <h1>My First Heading</h1>
            <p>My First Paragraph</p>
        </main>

        <footer>&copy; Copyright 2026 My Website Name</footer>

    </div>
</body>

</html>
