<!DOCTYPE html>
<html>
<head>
  <title>Exercise 6</title>
</head>
<body onload="insertText()">
  <p>This example shows texts inserted in an empty element when the page loads on the browser.</p>
  <p id="demo"></p>

  <script>
    function insertText() {
      document.getElementById("demo").innerHTML = "Hello!";
    }
  </script>
</body>
</html>
