<!DOCTYPE html>
<html>

<body>

    <h2>JavaScript Objects</h2>

    <script>

        // hasOwnProperty code in js 
        const object1 = new Object();
        object1.property1 = 42;
        object1.property2 = "string"

        console.log(object1.hasOwnProperty('property1')); // true 


    </script>


</body>

</html>
