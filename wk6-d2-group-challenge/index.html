<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bootstrap Challenge Wk2 Day2</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<p>This viewport size is currently: <span id="viewport-size" class="bg-info text-white fw-bold p-1"></span> <span id="breakpointName"></span></p>
<p>Breakpoints: Extra small (default) is &lt; 576 (and up); Small (SM) is &ge; 576px; Medium (MD) is &ge; 768px; Large (LG) is &ge; 992px; Extra Large (XL) is &ge; 1200px.</p>

<!-- Editing Starts Here -->
<div class="container mb-5">

    <!-- Row 1: SM+ -> One=2, Two=2, Three=remaining(8). Below SM -> equal width -->
    <div class="row">
      <div class="col col-sm-2 text-white bg-primary border my-1">
        One
      </div>
      <div class="col col-sm-2 text-white bg-primary border my-1">
        Two
      </div>
      <div class="col col-sm text-white bg-primary border my-1">
        Three
      </div>
    </div>

    <!-- Row 2: MD+ -> Four=3(25%), Five=6(50%), Six=3(25%). Below MD -> equal width -->
    <div class="row">
      <div class="col col-md-3 text-white bg-primary border my-1">
        Four
      </div>
      <div class="col col-md-6 text-white bg-primary border my-1">
        Five
      </div>
      <div class="col col-md-3 text-white bg-primary border my-1">
        Six
      </div>
    </div>

    <!-- Row 3: LG+ -> equal width. Below LG -> stacked -->
    <div class="row">
      <div class="col-lg text-white bg-primary border my-1">
        Seven
      </div>
      <div class="col-lg text-white bg-primary border my-1">
        Eight
      </div>
      <div class="col-lg text-white bg-primary border my-1">
        Nine
      </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
